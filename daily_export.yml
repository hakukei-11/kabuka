name: Daily Export

on:
  schedule:
    - cron: "0 1 * * *"   # 日本時間 AM10:00（UTC 01:00）
  workflow_dispatch:

permissions:
  contents: write

jobs:
  export:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install yfinance pandas requests

      - name: Run export_data.py
        env:
          LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
        run: |
          python export_data.py

      - name: Debug file existence
        run: |
          ls -R data || echo "dataフォルダなし"

      - name: Commit CSV and JSON
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add data -f  # ← dataフォルダを強制的にステージング
          git add update_status.json
          git commit -m "Daily export CSV and update_status.json" || echo "No changes"
          git push
