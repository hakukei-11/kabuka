name: Stock Close Update Checker

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    permissions:
      contents: write   # ← これが重要（push権限）

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install yfinance requests pandas numpy

    - name: Run update checker
      env:
        LINE_CHANNEL_ACCESS_TOKEN: ${{ secrets.LINE_CHANNEL_ACCESS_TOKEN }}
      run: |
        python update_checker.py

    - name: Commit update_status.json
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add update_status.json || echo "No file"
        git commit -m "Update stock close status" || echo "No changes"
        git push
