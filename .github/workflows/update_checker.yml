# .github/workflows/update_checker.yml
name: Stock Close Update Checker

on:
  schedule:
    - cron: "0 * * * *"   # 毎時0分に実行
  workflow_dispatch:       # 手動実行も可能

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"

    - name: Install dependencies
      run: |
        pip install yfinance

    - name: Run update checker
      run: |
        python update_checker.py

    - name: Commit update_status.json
      run: |
        git config user.name "github-actions"
        git config user.email "github-actions@github.com"
        git add update_status.json
        git commit -m "Update stock close status" || echo "No changes"
        git push
